<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cow Visioning - Dang nhap</title>
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="auth-logo-icon">🐄</span>
                <h1>Cow Visioning</h1>
            </div>
            <p class="auth-subtitle">Dang nhap de quan ly blog va du lieu bo cua ban</p>

            <form id="auth-form" class="auth-form" data-mode="login">
                <div class="auth-field">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" autocomplete="username" placeholder="vd: dattran26" autofocus required />
                </div>
                <div class="auth-field">
                    <label for="auth-password">Mat khau</label>
                    <input type="password" id="auth-password" autocomplete="current-password" placeholder="Nhap mat khau" required />
                </div>
                <div id="auth-error" class="auth-error" hidden></div>
                <button type="submit" class="auth-btn" id="auth-submit">Dang nhap</button>
            </form>
            <p class="auth-switch">Chua co tai khoan? <a href="/auth/register">Dang ky ngay</a></p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
