name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          APP_DIR="/home/${{ secrets.VPS_USER }}/myapp"
          STAGING_DIR="/home/${{ secrets.VPS_USER }}/myapp_staging"
          BACKUP_DIR="/home/${{ secrets.VPS_USER }}/myapp_backup_$(date +%Y%m%d_%H%M%S)"
          VENV_DIR="/home/${{ secrets.VPS_USER }}/.venvs/cow-visioning"
          export HOME="/home/${{ secrets.VPS_USER }}"
          export PM2_HOME="$HOME/.pm2"

          echo "=== Pulling latest code into staging ==="
          rm -rf "$STAGING_DIR"
          git clone --branch main --depth 1 git@github.com:DatTran26/Cow-Visioning.git "$STAGING_DIR"

          echo "=== Preserving runtime data ==="
          if [ -d "$APP_DIR" ]; then
            mv "$APP_DIR" "$BACKUP_DIR"
          fi

          mv "$STAGING_DIR" "$APP_DIR"
          mkdir -p "$APP_DIR/uploads" "$APP_DIR/logs"

          if [ -f "$BACKUP_DIR/.env" ]; then
            cp "$BACKUP_DIR/.env" "$APP_DIR/.env"
          fi
          if [ -d "$BACKUP_DIR/uploads" ]; then
            rm -rf "$APP_DIR/uploads"
            mv "$BACKUP_DIR/uploads" "$APP_DIR/uploads"
          fi
          if [ -d "$BACKUP_DIR/logs" ]; then
            rm -rf "$APP_DIR/logs"
            mv "$BACKUP_DIR/logs" "$APP_DIR/logs"
          fi
          mkdir -p "$(dirname "$VENV_DIR")"
          if [ -d "$BACKUP_DIR/.venv" ] && [ ! -e "$VENV_DIR" ]; then
            mv "$BACKUP_DIR/.venv" "$VENV_DIR"
          fi

          cd "$APP_DIR"

          echo "=== Installing dependencies ==="
          npm install --production

          echo "=== Installing AI service dependencies ==="
          if [ ! -x "$VENV_DIR/bin/python" ] || [ ! -x "$VENV_DIR/bin/pip" ]; then
            rm -rf "$VENV_DIR"
            if ! python3 -m venv "$VENV_DIR"; then
              echo "=== python3 venv support missing; attempting to install it ==="
              if command -v apt-get >/dev/null 2>&1; then
                PYTHON_MINOR="$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
                if command -v sudo >/dev/null 2>&1; then
                  sudo apt-get update
                  sudo apt-get install -y "python${PYTHON_MINOR}-venv" || sudo apt-get install -y python3-venv
                else
                  apt-get update
                  apt-get install -y "python${PYTHON_MINOR}-venv" || apt-get install -y python3-venv
                fi
                rm -rf "$VENV_DIR"
                python3 -m venv "$VENV_DIR"
              else
                echo "apt-get is unavailable and python3 -m venv failed; cannot bootstrap .venv" >&2
                exit 1
              fi
            fi
          fi
          rm -rf "$APP_DIR/.venv"
          ln -s "$VENV_DIR" "$APP_DIR/.venv"
          "$VENV_DIR/bin/python" -m pip install --upgrade pip
          "$VENV_DIR/bin/python" -m pip install -r ai_service/requirements.txt

          echo "=== Running database migrations ==="
          export $(grep -E '^DB_PASSWORD=' "$APP_DIR/.env")
          PGPASSWORD=$DB_PASSWORD psql -U cowapp -d cow_visioning -f "$APP_DIR/schema.sql"

          echo "=== Restarting services ==="
          pm2 startOrReload ecosystem.config.js --update-env

          echo "=== Cleaning old backups (best effort) ==="
          ls -dt /home/${{ secrets.VPS_USER }}/myapp_backup_* 2>/dev/null | tail -n +3 | xargs -r rm -rf

          echo "=== Deployment successful ==="
          pm2 status
          EOF

      - name: Notify Slack (Optional)
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Deployment '${{ job.status }}': Cow-Visioning on VPS",
              "blocks": [{
                "type": "section",
                "text": {"type": "mrkdwn", "text": "*Deployment Status*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}\nStatus: ${{ job.status }}"}
              }]
            }' || true
