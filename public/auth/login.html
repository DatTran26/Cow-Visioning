<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Cow Visioning AI</title>
  <meta name="description" content="Sign in to the Cow Visioning AI livestock monitoring and dataset collection platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-logo">
        <a href="/" style="text-decoration:none">
          <div class="logo-cow">CB</div>
          <h1>Cow Visioning</h1>
        </a>
      </header>

      <div class="auth-header">
        <p class="auth-subtitle">Welcome back! Sign in to continue building your smart dataset.</p>
      </div>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="auth-form" class="auth-form" data-mode="login">
        <div class="auth-field">
          <label for="auth-username">Username</label>
          <input type="text" id="auth-username" placeholder="Enter your username" required autofocus />
        </div>

        <div class="auth-field">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="Minimum 8 characters" required />
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" checked />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" id="auth-submit" class="auth-btn">Sign In</button>
      </form>

      <footer class="auth-switch">
        Don't have an account? <a href="/auth/register">Register now</a>
      </footer>
    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
