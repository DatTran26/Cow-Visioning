name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          APP_DIR="/home/${{ secrets.VPS_USER }}/myapp"
          STAGING_DIR="/home/${{ secrets.VPS_USER }}/myapp_staging"
          VENV_DIR="/home/${{ secrets.VPS_USER }}/.venvs/cow-visioning"
          export HOME="/home/${{ secrets.VPS_USER }}"
          export PM2_HOME="$HOME/.pm2"

          echo "=== Pulling latest code into staging ==="
          rm -rf "$STAGING_DIR"
          git clone --branch main --depth 1 git@github.com:DatTran26/Cow-Visioning.git "$STAGING_DIR"

          echo "=== Preserving runtime data ==="
          if [ -d "$APP_DIR" ]; then
            if [ -f "$APP_DIR/.env" ]; then
              cp "$APP_DIR/.env" "$STAGING_DIR/.env"
            fi
            if [ -d "$APP_DIR/uploads" ]; then
              rm -rf "$STAGING_DIR/uploads"
              cp -a "$APP_DIR/uploads" "$STAGING_DIR/uploads"
            fi
            if [ -d "$APP_DIR/logs" ]; then
              rm -rf "$STAGING_DIR/logs"
              cp -a "$APP_DIR/logs" "$STAGING_DIR/logs"
            fi
            mkdir -p "$(dirname "$VENV_DIR")"
            if [ -d "$APP_DIR/.venv" ] && [ ! -L "$APP_DIR/.venv" ] && [ ! -e "$VENV_DIR" ]; then
              mv "$APP_DIR/.venv" "$VENV_DIR"
            fi
            rm -rf "$APP_DIR"
          fi

          mv "$STAGING_DIR" "$APP_DIR"
          mkdir -p "$APP_DIR/uploads" "$APP_DIR/logs"

          cd "$APP_DIR"

          echo "=== Cleaning legacy backups (best effort) ==="
          rm -rf /home/${{ secrets.VPS_USER }}/myapp_backup_*

          echo "=== Installing dependencies ==="
          npm install --production

          echo "=== Validating AI service virtual environment ==="
          if [ ! -x "$VENV_DIR/bin/python" ] || [ ! -x "$VENV_DIR/bin/pip" ]; then
            echo "Shared AI virtualenv is missing at $VENV_DIR. Provision it manually on the VPS first." >&2
            exit 1
          fi
          rm -rf "$APP_DIR/.venv"
          ln -s "$VENV_DIR" "$APP_DIR/.venv"

          echo "=== Running database migrations ==="
          export $(grep -E '^DB_PASSWORD=' "$APP_DIR/.env")
          PGPASSWORD=$DB_PASSWORD psql -U cowapp -d cow_visioning -f "$APP_DIR/schema.sql"

          echo "=== Restarting services ==="
          pm2 startOrReload ecosystem.config.js --update-env

          echo "=== Deployment successful ==="
          pm2 status
          EOF

      - name: Notify Slack (Optional)
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Deployment '${{ job.status }}': Cow-Visioning on VPS",
              "blocks": [{
                "type": "section",
                "text": {"type": "mrkdwn", "text": "*Deployment Status*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}\nStatus: ${{ job.status }}"}
              }]
            }' || true
