name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          echo "=== Pulling latest code ==="
          cd /home/${{ secrets.VPS_USER }}/myapp
          mkdir -p uploads logs

          echo "=== Preparing working tree ==="
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.env' \
            ! -name 'uploads' \
            ! -name 'logs' \
            ! -name '.venv' \
            -exec rm -rf {} +

          git fetch origin main
          git reset --hard origin/main

          echo "=== Installing dependencies ==="
          npm install --production

          echo "=== Installing AI service dependencies ==="
          python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r ai_service/requirements.txt

          echo "=== Running database migrations ==="
          export $(grep -E '^DB_PASSWORD=' /home/${{ secrets.VPS_USER }}/myapp/.env)
          PGPASSWORD=$DB_PASSWORD psql -U cowapp -d cow_visioning -f /home/${{ secrets.VPS_USER }}/myapp/schema.sql

          echo "=== Restarting services ==="
          pm2 startOrReload ecosystem.config.js --update-env

          echo "=== Deployment successful ==="
          pm2 status
          EOF

      - name: Notify Slack (Optional)
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Deployment '${{ job.status }}': Cow-Visioning on VPS",
              "blocks": [{
                "type": "section",
                "text": {"type": "mrkdwn", "text": "*Deployment Status*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}\nStatus: ${{ job.status }}"}
              }]
            }' || true
