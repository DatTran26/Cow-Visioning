<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Cow Visioning AI</title>
  <meta name="description" content="Create a new account to join and manage your AI livestock dataset." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-logo">
        <a href="/" style="text-decoration:none">
          <div class="logo-cow">CB</div>
          <h1>Cow Visioning</h1>
        </a>
      </header>

      <div class="auth-header">
        <p class="auth-subtitle">Join the AI Vision livestock community. Register now to get started!</p>
      </div>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="auth-form" class="auth-form" data-mode="register">
        <div class="auth-field">
          <label for="auth-username">Username</label>
          <input type="text" id="auth-username" placeholder="e.g. john_doe_01" required autofocus />
        </div>

        <div class="auth-field">
          <label for="auth-email">Email Address</label>
          <input type="email" id="auth-email" placeholder="email@example.com" required />
        </div>

        <div class="auth-field">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="Minimum 8 characters" required />
        </div>

        <div class="auth-field">
          <label for="auth-password-confirm">Confirm Password</label>
          <input type="password" id="auth-password-confirm" placeholder="Re-enter your password" required />
        </div>

        <button type="submit" id="auth-submit" class="auth-btn">Create Account</button>
      </form>

      <footer class="auth-switch">
        Already have an account? <a href="/auth/login">Sign in</a>
      </footer>
    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
