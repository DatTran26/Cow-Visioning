name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          APP_DIR="/home/${{ secrets.VPS_USER }}/myapp"
          STAGING_DIR="/home/${{ secrets.VPS_USER }}/myapp_staging"
          BACKUP_DIR="/home/${{ secrets.VPS_USER }}/myapp_backup_$(date +%Y%m%d_%H%M%S)"

          echo "=== Pulling latest code into staging ==="
          rm -rf "$STAGING_DIR"
          git clone --branch main --depth 1 git@github.com:DatTran26/Cow-Visioning.git "$STAGING_DIR"

          echo "=== Preserving runtime data ==="
          if [ -d "$APP_DIR" ]; then
            mv "$APP_DIR" "$BACKUP_DIR"
          fi

          mv "$STAGING_DIR" "$APP_DIR"
          mkdir -p "$APP_DIR/uploads" "$APP_DIR/logs"

          if [ -f "$BACKUP_DIR/.env" ]; then
            cp "$BACKUP_DIR/.env" "$APP_DIR/.env"
          fi
          if [ -d "$BACKUP_DIR/uploads" ]; then
            rm -rf "$APP_DIR/uploads"
            mv "$BACKUP_DIR/uploads" "$APP_DIR/uploads"
          fi
          if [ -d "$BACKUP_DIR/logs" ]; then
            rm -rf "$APP_DIR/logs"
            mv "$BACKUP_DIR/logs" "$APP_DIR/logs"
          fi
          if [ -d "$BACKUP_DIR/.venv" ]; then
            rm -rf "$APP_DIR/.venv"
            mv "$BACKUP_DIR/.venv" "$APP_DIR/.venv"
          fi

          cd "$APP_DIR"

          echo "=== Installing dependencies ==="
          npm install --production

          echo "=== Installing AI service dependencies ==="
          [ -d .venv ] || python3 -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r ai_service/requirements.txt

          echo "=== Running database migrations ==="
          export $(grep -E '^DB_PASSWORD=' "$APP_DIR/.env")
          PGPASSWORD=$DB_PASSWORD psql -U cowapp -d cow_visioning -f "$APP_DIR/schema.sql"

          echo "=== Restarting services ==="
          pm2 startOrReload ecosystem.config.js --update-env

          echo "=== Cleaning old backups (best effort) ==="
          ls -dt /home/${{ secrets.VPS_USER }}/myapp_backup_* 2>/dev/null | tail -n +3 | xargs -r rm -rf

          echo "=== Deployment successful ==="
          pm2 status
          EOF

      - name: Notify Slack (Optional)
        if: always()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Deployment '${{ job.status }}': Cow-Visioning on VPS",
              "blocks": [{
                "type": "section",
                "text": {"type": "mrkdwn", "text": "*Deployment Status*\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref }}\nStatus: ${{ job.status }}"}
              }]
            }' || true
