<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký tài khoản — Con Bò Cười AI</title>
  <meta name="description" content="Tạo tài khoản mới để tham gia đóng góp và quản lý tập dữ liệu chăn nuôi thông minh." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-bg"></div>

  <div class="auth-container">
    <div class="auth-card">
      <header class="auth-logo">
        <a href="/" style="text-decoration:none">
          <div class="logo-cow">CB</div>
          <h1>Con Bò Cười</h1>
        </a>
      </header>

      <div class="auth-header">
        <p class="auth-subtitle">Tham gia cộng đồng AI Vision trong chăn nuôi. Đăng ký ngay để bắt đầu!</p>
      </div>

      <div id="auth-error" class="auth-error" hidden></div>

      <form id="auth-form" class="auth-form" data-mode="register">
        <div class="auth-field">
          <label for="auth-username">Tên đăng nhập</label>
          <input type="text" id="auth-username" placeholder="Ví dụ: van_nguyen_01" required autofocus />
        </div>

        <div class="auth-field">
          <label for="auth-email">Địa chỉ Email</label>
          <input type="email" id="auth-email" placeholder="email@vi-du.com" required />
        </div>

        <div class="auth-field">
          <label for="auth-password">Mật khẩu</label>
          <input type="password" id="auth-password" placeholder="Tối thiểu 8 ký tự" required />
        </div>

        <div class="auth-field">
          <label for="auth-password-confirm">Xác nhận mật khẩu</label>
          <input type="password" id="auth-password-confirm" placeholder="Nhập lại mật khẩu" required />
        </div>

        <button type="submit" id="auth-submit" class="auth-btn">Tạo tài khoản</button>
      </form>

      <footer class="auth-switch">
        Bạn đã có tài khoản rồi? <a href="/auth/login">Đăng nhập ngay</a>
      </footer>
    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
